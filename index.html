<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox – gauravdotorg@gmail.com</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #f0f4f9;
  --white: #fff;
  --border: #e0e0e0;
  --blue: #0b57d0;
  --text: #202124;
  --muted: #444746;
  --light: #5f6368;
  --hover: #e8eaed;
  --active-bg: #d3e3fd;
  --row-hover: #f1f3f4;
  --sidebar-w: 260px;
}

body {
  font-family: 'Google Sans', Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
}

/* ── TOPBAR ── */
.topbar {
  height: 64px; background: var(--bg);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px; flex-shrink: 0; z-index: 10;
}
.hamburger {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; cursor: pointer; flex-shrink: 0;
}
.hamburger:hover { background: var(--hover); }
.hamburger span { display:block; width:18px; height:2px; background:#444746; border-radius:2px; }
.gmail-logo { display:flex; align-items:center; gap:6px; flex-shrink:0; margin-right:4px; }
.gmail-logo svg { width:36px; height:26px; }
.gmail-logo-text { font-size:22px; font-weight:400; color:#444746; letter-spacing:-0.3px; }
.search-wrap { flex:1; display:flex; justify-content:center; }
.search-box {
  display:flex; align-items:center; background:#eaf1fb;
  border-radius:28px; padding:0 12px 0 20px; height:48px;
  width:100%; max-width:700px; gap:12px;
  transition:box-shadow .15s, background .15s;
}
.search-box:focus-within { background:var(--white); box-shadow:0 2px 8px #0002; }
.search-box input { flex:1; border:none; background:transparent; font-size:16px; outline:none; color:var(--text); font-family:inherit; }
.search-box input::placeholder { color:#444746; }
.search-icon { color:#444746; flex-shrink:0; display:flex; }
.search-filter-btn { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.search-filter-btn:hover { background:rgba(0,0,0,.08); }
.topbar-right { display:flex; align-items:center; gap:4px; margin-left:auto; flex-shrink:0; }
.tb-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#444746; }
.tb-icon:hover { background:var(--hover); }
.avatar-circle { width:32px; height:32px; border-radius:50%; background:#c0392b; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-left:6px; }

/* ── APP BODY ── */
.app-body { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink:0;
  overflow-y:auto; padding:8px 0 16px;
  background:var(--bg); display:flex; flex-direction:column;
}
.compose-btn {
  display:flex; align-items:center; gap:14px;
  margin:4px 12px 16px; background:#c2e7ff;
  border:none; border-radius:18px; padding:16px 24px;
  font-size:15px; font-weight:500; color:#001d35;
  cursor:pointer; font-family:inherit;
  transition:box-shadow .15s; width:calc(100% - 24px);
}
.compose-btn:hover { box-shadow:0 2px 8px #0002; }
.nav-item {
  display:flex; align-items:center; gap:16px;
  padding:6px 24px 6px 20px; border-radius:0 28px 28px 0;
  margin-right:16px; cursor:pointer; font-size:14px; color:var(--text);
  height:40px; transition:background .1s; text-decoration:none; white-space:nowrap;
}
.nav-item:hover { background:var(--hover); }
.nav-item.active { background:var(--active-bg); font-weight:700; }
.nav-item .ni-icon { width:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.nav-item .ni-label { flex:1; }
.nav-item .ni-count { font-size:12px; color:var(--text); font-weight:400; }
.nav-item.active .ni-count { font-weight:700; }
.nav-divider { height:1px; background:#e0e0e0; margin:8px 16px; }
.nav-section {
  font-size:13px; color:var(--muted); padding:6px 20px; cursor:pointer;
  display:flex; align-items:center; gap:16px; height:40px;
  border-radius:0 28px 28px 0; margin-right:16px;
}
.nav-section:hover { background:var(--hover); }

.labels-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px 4px; font-size:13px; font-weight:500; color:var(--muted);
}
.labels-header span { cursor:pointer; font-size:18px; }

.upgrade-bar {
  display:flex; align-items:center; gap:12px; padding:10px 20px;
  margin-top:auto; cursor:pointer; font-size:14px; color:var(--text);
  border-top:1px solid var(--border);
}
.upgrade-bar:hover { background:var(--hover); }
.upgrade-bar .ub-arrow { margin-left:auto; }

/* ── MAIN AREA ── */
.main-area { flex:1; display:flex; overflow:hidden; }

/* ── INBOX PANEL ── */
.inbox-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background:var(--white); border-radius:16px;
  margin:8px 0 8px 0; border:1px solid #c4c7c5;
}

/* Toolbar */
.inbox-toolbar {
  display:flex; align-items:center; gap:2px;
  padding:8px 12px; height:48px; flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.tbar-btn { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.tbar-btn:hover { background:var(--hover); }
.tbar-select { display:flex; align-items:center; }
.tbar-caret { width:20px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.pg-count { margin-left:auto; font-size:13px; color:var(--muted); display:flex; align-items:center; gap:2px; }
.pg-arrow { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.pg-arrow:hover:not(.disabled) { background:var(--hover); }
.pg-arrow.disabled { opacity:.4; cursor:default; }

/* Tabs */
.inbox-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--white); }
.tab {
  display:flex; align-items:center; gap:10px; padding:0 28px; height:52px;
  font-size:14px; color:var(--muted); cursor:pointer;
  border-bottom:3px solid transparent; transition:background .1s; white-space:nowrap;
}
.tab:hover { background:#f8f9fa; }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:500; }

/* Email list */
.email-list { flex:1; overflow-y:auto; background:var(--white); display:flex; flex-direction:column; }

.email-row {
  display:flex; align-items:center; padding:0 12px; height:50px;
  border-bottom:1px solid #f0f0f0; cursor:pointer; position:relative;
  background:var(--white); transition:background .08s; flex-shrink:0;
}
.email-row:hover { background:var(--row-hover); z-index:1; }
.email-row.unread .e-sender { font-weight:700; }
.email-row.unread .e-subject { font-weight:700; }
.email-row.unread .e-date { font-weight:700; color:var(--text); }

.e-check { width:52px; display:flex; align-items:center; justify-content:flex-start; gap:6px; flex-shrink:0; padding-left:2px; }
.e-cb { width:18px; height:18px; border:2px solid #666; border-radius:3px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.e-cb.checked { background:var(--blue); border-color:var(--blue); }
.e-cb.checked::after { content:'✓'; color:#fff; font-size:11px; }
.e-star { font-size:17px; color:#ccc; cursor:pointer; flex-shrink:0; line-height:1; }
.e-star.on { color:#f4b400; }
.email-row:hover .e-star:not(.on) { color:#bbb; }

.e-sender { width:160px; flex-shrink:0; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); padding-right:8px; }
.e-body { flex:1; display:flex; align-items:center; overflow:hidden; min-width:0; }
.e-subject { font-size:14px; color:var(--text); white-space:nowrap; flex-shrink:0; max-width:300px; overflow:hidden; text-overflow:ellipsis; }
.e-preview { font-size:14px; color:var(--light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:6px; }
.e-preview::before { content:' - '; }

.e-actions { display:none; align-items:center; gap:2px; flex-shrink:0; }
.email-row:hover .e-actions { display:flex; }
.email-row:hover .e-date { display:none; }
.ea-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.ea-btn:hover { background:#e0e0e0; }

.e-date { font-size:12px; color:var(--muted); white-space:nowrap; margin-left:8px; flex-shrink:0; }

/* empty + footer */
.list-footer {
  margin-top:auto; padding:20px 16px;
  display:flex; flex-direction:column; gap:8px;
}
.storage-bar-wrap { display:flex; align-items:center; gap:10px; }
.storage-bar-bg { width:200px; height:6px; background:#e0e0e0; border-radius:3px; }
.storage-bar-fill { width:11%; height:100%; background:#444746; border-radius:3px; }
.storage-label { font-size:12px; color:var(--light); display:flex; align-items:center; gap:4px; }
.footer-links { font-size:12px; color:var(--light); display:flex; gap:0; align-items:center; justify-content:space-between; }
.footer-links a { color:var(--light); text-decoration:none; }
.footer-links a:hover { text-decoration:underline; }
.footer-links .dot { margin:0 4px; }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--light); padding:60px 20px; text-align:center; }
.empty-state .es-icon { font-size:72px; margin-bottom:16px; opacity:.5; }
.empty-state h3 { font-size:18px; font-weight:400; margin-bottom:8px; color:var(--muted); }

/* ── EMAIL OPEN VIEW (Image 1 style) ── */
.email-open-view {
  display:none; flex:1; flex-direction:column; overflow:hidden;
  background:var(--white); border-radius:16px;
  margin:8px 0 8px 0; border:1px solid #c4c7c5;
}
.email-open-view.visible { display:flex; }

/* top action bar */
.eov-toolbar {
  display:flex; align-items:center; padding:8px 16px; gap:2px;
  height:52px; flex-shrink:0; border-bottom:1px solid var(--border);
}
.eov-btn { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.eov-btn:hover { background:var(--hover); }
.eov-sep { width:1px; height:24px; background:var(--border); margin:0 4px; }
.eov-pg { margin-left:auto; font-size:13px; color:var(--muted); display:flex; align-items:center; gap:2px; }
.eov-pg-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.eov-pg-btn:hover { background:var(--hover); }

.eov-body { flex:1; overflow-y:auto; padding:24px 40px 40px; }

/* Subject line */
.eov-subject-row {
  display:flex; align-items:center; gap:12px; margin-bottom:20px;
}
.eov-subject { font-size:24px; font-weight:400; color:var(--text); flex:1; }
.eov-inbox-tag {
  display:inline-flex; align-items:center; gap:4px;
  background:#f1f3f4; border-radius:4px; padding:2px 8px;
  font-size:12px; color:var(--muted); border:1px solid #dadce0; cursor:pointer;
}
.eov-inbox-tag:hover { background:#e8eaed; }
.eov-subject-actions { display:flex; gap:4px; }
.eov-sa-btn { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.eov-sa-btn:hover { background:var(--hover); }

/* sender row */
.eov-sender-row {
  display:flex; align-items:flex-start; gap:14px; margin-bottom:24px;
}
.eov-avatar {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:15px; font-weight:600; flex-shrink:0;
}
.eov-from-info { flex:1; }
.eov-from-name { font-size:14px; font-weight:600; color:var(--text); }
.eov-from-email { font-size:12px; color:var(--light); }
.eov-to { font-size:12px; color:var(--light); cursor:pointer; display:flex; align-items:center; gap:2px; }
.eov-from-date { font-size:12px; color:var(--light); white-space:nowrap; margin-left:auto; }
.eov-from-actions { display:flex; gap:4px; flex-shrink:0; align-items:center; }
.eov-fa-btn { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); }
.eov-fa-btn:hover { background:var(--hover); }

/* email card */
.eov-card {
  background:#fafaf8; border:1px solid #e8e8e8; border-radius:8px;
  padding:32px 40px; margin-bottom:32px; max-width:680px;
}

.eov-content { font-size:14px; line-height:1.8; color:var(--text); max-width:680px; }
.eov-content p { margin-bottom:14px; }
.eov-content h2 { font-size:18px; font-weight:700; margin-bottom:12px; }
.eov-content a { color:var(--blue); }
.eov-content strong { font-weight:700; }

/* bottom reply/forward bar */
.eov-reply-bar {
  display:flex; align-items:center; justify-content:center; gap:16px;
  padding:16px; border-top:1px solid var(--border); flex-shrink:0;
}
.reply-btn {
  display:flex; align-items:center; gap:8px;
  border:1px solid #dadce0; border-radius:20px;
  padding:8px 20px; font-size:14px; color:var(--muted);
  cursor:pointer; background:var(--white); font-family:inherit;
  transition:background .1s;
}
.reply-btn:hover { background:var(--row-hover); }
.react-btn {
  width:36px; height:36px; border-radius:50%;
  border:1px solid #dadce0; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; background:var(--white);
}
.react-btn:hover { background:var(--row-hover); }

/* right strip */
.right-strip {
  width:56px; flex-shrink:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  padding:12px 0; gap:8px; border-left:1px solid #e0e0e0;
}
.rs-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); position:relative; }
.rs-icon:hover { background:var(--hover); }
.rs-icon .badge { position:absolute; top:5px; right:5px; width:8px; height:8px; background:var(--blue); border-radius:50%; }
.rs-divider { width:24px; height:1px; background:#e0e0e0; }
.rs-plus { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); font-size:22px; }
.rs-plus:hover { background:var(--hover); }

/* scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }
</style>
</head>

  </div>`;
}

function renderList(rowIds) {
  const list = document.getElementById('email-list');
  if (!rowIds || rowIds.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">📭</div><h3>Nothing here</h3><p>This folder is empty.</p></div>`;
    return;
  }
  list.innerHTML = rowIds.map(id => {
    const e = emails[id];
    return `<div class="email-row ${e.unread ? 'unread' : ''}" onclick="openEmail('${id}')">
      <div class="e-check">
        <div class="e-cb" onclick="event.stopPropagation();this.classList.toggle('checked')"></div>
        <span class="e-star ${e.star ? 'on' : ''}" onclick="event.stopPropagation();this.classList.toggle('on');this.textContent=this.classList.contains('on')?'★':'☆'">${e.star ? '★' : '☆'}</span>
      </div>
      <div class="e-sender">${e.sender}</div>
      <div class="e-body">
        <span class="e-subject">${e.subject}</span>
        <span class="e-preview">${e.preview}</span>
      </div>
      ${actionIcons()}
      <span class="e-date">${e.date}</span>
    </div>`;
  }).join('') + `<div class="list-footer">
    <div class="storage-bar-wrap">
      <div class="storage-bar-bg"><div class="storage-bar-fill"></div></div>
      <div class="storage-label">11% of 15 GB used <span style="cursor:pointer;">↗</span></div>

      <div style="text-align:right;">Last account activity: 2 hours ago<br><a href="#" style="color:#1a73e8;">Details</a></div>
    </div>
  </div>`;
}

function showPage(page, el) {
  closeEmail();
  currentPageRows = pages[page] ? pages[page].rows : [];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');

  const tabsEl = document.getElementById('inbox-tabs');
  tabsEl.style.display = pages[page] && pages[page].tabs ? 'flex' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');

  document.getElementById('pg-label').textContent = pages[page] ? pages[page].title : '0 of 0';
  renderList(currentPageRows);
}

function showTab(tab, el) {
  closeEmail();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentPageRows = tabs[tab] || [];
  const count = currentPageRows.length;
  document.getElementById('pg-label').textContent = count ? `1–${count} of ${count}` : '0 of 0';
  renderList(currentPageRows);
}

function openEmail(id) {
  currentEmailId = id;
  currentEmailIndex = currentPageRows.indexOf(id);
  const e = emails[id];
  if (!e) return;

  document.getElementById('inbox-panel').style.display = 'none';
  const eov = document.getElementById('email-open-view');
  eov.classList.add('visible');

  document.getElementById('eov-body').innerHTML = e.body;
  document.getElementById('eov-pg-label').textContent = e.pgLabel;

  // prev/next button states
  document.getElementById('eov-prev').style.opacity = currentEmailIndex > 0 ? '1' : '0.4';
  document.getElementById('eov-next').style.opacity = currentEmailIndex < currentPageRows.length - 1 ? '1' : '0.4';
}

function closeEmail() {
  document.getElementById('inbox-panel').style.display = 'flex';
  document.getElementById('email-open-view').classList.remove('visible');
}

function navEmail(dir) {
  const next = currentEmailIndex + dir;
  if (next < 0 || next >= currentPageRows.length) return;
  openEmail(currentPageRows[next]);
}

function toggleMore(el) {
  const more = document.getElementById('more-items');
  const svg = el.querySelector('svg');
  if (more.style.display === 'none') {
    more.style.display = '';
    svg.innerHTML = '<path fill="#444746" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>';
    el.querySelector('span:last-child').textContent = 'Less';
  } else {
    more.style.display = 'none';
    svg.innerHTML = '<path fill="#444746" d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/>';
    el.querySelector('span:last-child').textContent = 'More';
  }
}
